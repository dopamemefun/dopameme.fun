<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dopameme.fun</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="entryScreen" class="entry-screen">
        <button id="enterSiteBtn" class="glitch-button">
            【click to enter】
        </button>
    </div>

    <div id="siteContent" class="site-content">
        <div class="main-content-wrapper">
            <div class="header-section">
                <h1><span id="glitchText">Dopameme</span></h1>
                <img id="customHeaderImage" src="dopc6emz-image.png" alt="DopC6emz Header">
                
                <a href="https://discord.gg/pepe" target="_blank" id="joinNowLink">
                    <button id="joinNowBtn">
                        <span class="material-icons">discord</span> Join Now!
                    </button>
                </a>
            </div>

            <div class="audio-player-container">
                <div class="player-visuals">
                    <img id="albumArt" src="album-art.png" alt="Album Art">
                    <div class="song-info">
                        <div class="song-title">SHA STACCZ - DANGER PT2</div>
                        <div class="song-artist">SHA STACCZ (feat. bagvisuals)</div>
                    </div>
                </div>

                <div class="player-controls">
                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="totalTime">00:00</span>
                    </div>
                    
                    <!-- UPDATED PROGRESS BAR (ONLY THIS SECTION CHANGED) -->
                    <div class="progress-bar-container">
                        <div id="progressBarFill">
                            <div class="progress-thumb"></div>
                        </div>
                    </div>
                    
                    <div class="playback-buttons">
                        <button id="playPauseBtn" class="material-icons">play_arrow</button>
                        <audio id="musicTrack" src="music.mp3" preload="auto" loop></audio>
                        
                        <!-- UPDATED VOLUME CONTROL (ONLY THIS SECTION CHANGED) -->
                        <div class="volume-control">
                            <span id="volumeIcon" class="material-icons">volume_up</span>
                            <div class="volume-track">
                                <div class="volume-fill">
                                    <div class="volume-thumb"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="glitch-effect.js"></script>
</body>
</html>
